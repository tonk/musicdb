name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build -- --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicDB-linux-x86_64
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Publish Forgejo release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          API="${{ github.server_url }}/api/v1"
          REPO="${{ github.repository }}"
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)

          # Create the release (ignore error if it already exists)
          RELEASE=$(curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/repos/${REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"MusicDB ${TAG}\",\"draft\":false,\"prerelease\":false}") || \
          RELEASE=$(curl -sf \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${API}/repos/${REPO}/releases/tags/${TAG}")

          RELEASE_ID=$(echo "${RELEASE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Upload the AppImage asset
          curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "${API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=$(basename ${APPIMAGE})" \
            --data-binary @"${APPIMAGE}"
